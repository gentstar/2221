<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>웹 명함 - 김의진</title>
  <style>
    :root{
      --bg1:#f8fafc;
      --bg2:#eef2ff;
      --card: rgba(255,255,255,.78);
      --text:#0b1220;
      --muted:#4b556d;
      --accent:#2563eb;
      --accent2:#6366f1;
      --ring: rgba(37,99,235,.22);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, "Apple SD Gothic Neo", sans-serif;
      background: radial-gradient(900px 500px at 15% 20%, #dbeafe, transparent 60%),
                  radial-gradient(700px 450px at 90% 30%, rgba(99,102,241,.18), transparent 55%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      padding:24px;
    }
    .wrap{
      width:min(520px, 100%);
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.76));
      border:1px solid rgba(15,23,42,.12);
      border-radius:22px;
      padding:26px;
      box-shadow: 0 18px 50px rgba(2,6,23,.12);
      backdrop-filter: blur(10px);
      position:relative;
      overflow:hidden;
    }
    .card:before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(500px 200px at 20% 0%, rgba(37,99,235,.16), transparent 60%),
        radial-gradient(420px 240px at 100% 20%, rgba(99,102,241,.12), transparent 55%);
      pointer-events:none;
    }
    .inner{position:relative}
    .top{
      display:flex;
      align-items:flex-start;
      gap:16px;
      margin-bottom:18px;
    }
    .avatar{
      width:74px; height:74px;
      border-radius:18px;
      background:
        linear-gradient(135deg, rgba(37,99,235,.18), rgba(99,102,241,.14)),
        rgba(255,255,255,.85);
      border:1px solid rgba(15,23,42,.12);
      display:grid;
      place-items:center;
      box-shadow: 0 0 0 6px var(--ring);
      flex:0 0 auto;
    }
    .avatar span{
      font-weight:800;
      letter-spacing:-.02em;
      font-size:18px;
    }
    .name{
      font-size:28px;
      margin:0;
      letter-spacing:-.03em;
      line-height:1.15;
    }
    .role{
      margin:6px 0 0;
      color:var(--muted);
      font-weight:600;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .badge{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(15,23,42,.12);
      color:rgba(11,18,32,.92);
      background: rgba(255,255,255,.62);
    }
    .divider{
      height:1px;
      background: rgba(15,23,42,.10);
      margin:18px 0;
      border-radius:999px;
    }
    .tagline{
      margin:0;
      font-size:18px;
      color:rgba(11,18,32,.92);
      font-weight:650;
      letter-spacing:-.01em;
    }
    .tagline small{
      display:block;
      margin-top:8px;
      color:var(--muted);
      font-weight:500;
      font-size:13px;
    }
    .footer{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:rgba(11,18,32,.62);
      font-size:12px;
    }
    .hint{
      padding:8px 12px;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.10);
      background: rgba(255,255,255,.60);
    }
    .cta{
      margin-top:14px;
      display:flex;
      justify-content:flex-start;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(37,99,235,.22);
      background: linear-gradient(180deg, rgba(37,99,235,.12), rgba(37,99,235,.06));
      color: rgba(11,18,32,.92);
      text-decoration:none;
      font-weight:700;
      letter-spacing:-.01em;
      box-shadow: 0 8px 20px rgba(37,99,235,.10);
      transition: transform .08s ease, box-shadow .08s ease;
      outline: none;
    }
    .btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(37,99,235,.16);
    }
    .btn:focus-visible{
      box-shadow: 0 0 0 4px rgba(37,99,235,.25), 0 10px 26px rgba(37,99,235,.16);
    }
    .btn svg{
      width:18px;
      height:18px;
      margin-right:10px;
      flex:0 0 auto;
      display:block;
    }
    @media (max-width:420px){
      .card{padding:20px}
      .top{gap:12px}
      .name{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card" aria-label="웹 명함">
      <div class="inner">
        <div class="top">
          <div class="avatar" aria-hidden="true"><span>김</span></div>
          <div>
            <h1 class="name">김의진</h1>
            <div class="role">
              <span class="badge">직업</span>
              <span>경찰</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <p class="tagline">
          착한사람.
          <small>한줄 소개</small>
        </p>

        <div class="footer">
          <div class="hint">웹 명함</div>
          <div>김의진 · 경찰</div>
        </div>

        <div class="cta">
          <a class="btn" href="https://youtu.be/FSg2laEjEXM?si=SsrEHitO3jJNi5Bi" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <rect x="2.8" y="2.8" width="18.4" height="18.4" rx="6.2" fill="#ff0000"/>
              <path d="M10.2 8.7v6.6l6-3.3-6-3.3z" fill="#ffffff"/>
            </svg>
            <span>클릭하세요</span>
          </a>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
